<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decorative Lamping Guide — Lumber & Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F5F0; --parchment: #EFECE5; --ink: #1E1C19; --ink-mid: #5C5955;
    --ink-light: #9E9B96; --ink-faint: #CEC9C2; --gold: #9A8A6A; --gold-light: #C4B49A;
    --border: rgba(30,28,25,0.1); --border-mid: rgba(30,28,25,0.2); --white: #FDFCFA;
  }
  body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--parchment); color: var(--ink); min-height: 100vh; padding: 2.5rem; }
  .guide { max-width: 920px; margin: 0 auto; background: var(--white); border: 0.5px solid var(--border); box-shadow: 0 4px 40px rgba(30,28,25,0.07), 0 1px 4px rgba(30,28,25,0.04); }
  .guide-header { padding: 4rem 3.5rem 3rem; display: flex; justify-content: space-between; align-items: flex-end; background: var(--white); }
  .header-project h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 46px; line-height: 1.0; letter-spacing: 0.015em; color: var(--ink); margin-bottom: 10px; }
  .header-project h1[contenteditable]:focus { outline: none; border-bottom: 0.5px solid var(--border-mid); }
  .header-project .subtitle { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); font-weight: 400; }
  .header-meta { text-align: right; }
  .header-meta .date { font-size: 11px; color: var(--ink-light); letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 300; }
  .header-meta .brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; font-style: italic; color: var(--gold); letter-spacing: 0.02em; }
  .toolbar { padding: 0.9rem 3.5rem; display: flex; align-items: center; gap: 10px; background: var(--cream); }
  .toolbar-btn { font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 16px; border: 0.5px solid var(--border-mid); background: var(--white); color: var(--ink-mid); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.18s; text-decoration: none; }
  .toolbar-btn:hover { border-color: var(--gold-light); color: var(--ink); }
  .toolbar-btn i { font-size: 13px; }
  .toolbar-spacer { flex: 1; }
  .toolbar-hint { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; font-style: italic; }
  .fixture-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .fixture-card { padding: 2.5rem 3.5rem; position: relative; transition: background 0.2s; }
  .fixture-card:hover { background: #FEFDFB; }
  .fixture-card:hover .card-delete { opacity: 1; }
  .card-delete { position: absolute; top: 14px; right: 14px; background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 11px; opacity: 0; transition: opacity 0.15s, color 0.15s; padding: 4px; line-height: 1; }
  .card-delete:hover { color: var(--ink); }
  .fixture-id-input { font-family: 'Jost', sans-serif; font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; color: var(--ink); background: transparent; border: none; border-bottom: 0.5px solid transparent; outline: none; padding: 1px 0; margin-bottom: 1.25rem; display: block; width: 85%; transition: border-color 0.15s; }
  .fixture-id-input:hover, .fixture-id-input:focus { border-bottom-color: var(--border-mid); }
  .card-images { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .img-slot { aspect-ratio: 4/3; background: var(--cream); border: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden; }
  .img-slot:hover { border-color: var(--gold-light); background: var(--parchment); }
  .img-slot.drag-over { border-color: var(--gold); background: var(--parchment); outline: 1.5px solid var(--gold-light); }
  .img-slot span { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); font-weight: 400; }
  .img-slot i { font-size: 18px; color: var(--ink-faint); }
  .img-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: var(--cream); }
  .img-delete { position: absolute; top: 4px; right: 4px; background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 11px; line-height: 1; z-index: 2; opacity: 0; transition: opacity 0.15s, color 0.15s; padding: 2px; }
  .img-delete:hover { color: var(--ink); }
  .img-slot:hover .img-delete { opacity: 1; }
  .spec-table { width: 100%; border-collapse: collapse; }
  .spec-table td { padding: 6px 0; vertical-align: middle; }
  .spec-label { font-size: 8.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-light); font-weight: 400; width: 40%; }
  .spec-value { text-align: right; }
  .spec-input { font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; color: var(--ink); background: transparent; border: none; border-bottom: 0.5px solid transparent; text-align: right; width: 100%; padding: 1px 0; outline: none; transition: border-color 0.15s; }
  .spec-input:hover, .spec-input:focus { border-bottom-color: var(--border-mid); }
  .spec-input.qty { width: 56px; }
  .add-row { padding: 1.5rem 3.5rem; background: var(--white); }
  .add-btn { font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 400; color: var(--ink-faint); background: none; border: 0.5px dashed var(--border-mid); padding: 10px 18px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color 0.15s, border-color 0.15s; width: 100%; justify-content: center; }
  .add-btn:hover { color: var(--ink-mid); border-color: var(--gold-light); }
  .add-btn i { font-size: 12px; }
  .guide-footer { padding: 2.75rem 3.5rem 2.25rem; display: flex; justify-content: space-between; align-items: flex-end; background: var(--white); }
  .contact-grid { display: grid; grid-template-columns: auto auto; gap: 0 3.5rem; }
  .contact-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .contact-label { font-size: 8px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); font-weight: 400; }
  .contact-input { font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; color: var(--ink-mid); background: transparent; border: none; border-bottom: 0.5px solid transparent; outline: none; padding: 1px 0; transition: border-color 0.15s, color 0.15s; width: 220px; }
  .contact-input:hover, .contact-input:focus { border-bottom-color: var(--border-mid); color: var(--ink); }
  .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--gold-light); font-weight: 400; letter-spacing: 0.02em; }

  @media print {
    body { background: white; padding: 0; }
    .guide { border: none; box-shadow: none; max-width: 100%; }
    .toolbar, .add-row, .card-delete, .img-delete { display: none !important; }
    .guide-header { padding: 1rem 2rem 0.75rem; }
    .header-project h1 { font-size: 24px; margin-bottom: 4px; }
    .header-meta .date { font-size: 9px; }
    .header-meta .brand { font-size: 12px; }
    .header-project .subtitle { font-size: 7px; }
    .fixture-grid { display: block !important; }
    .print-page { display: grid; grid-template-columns: 1fr 1fr; break-inside: avoid; page-break-inside: avoid; }
    .print-page + .print-page { break-before: always; page-break-before: always; }
    .fixture-card { break-inside: avoid; page-break-inside: avoid; padding: 1rem 2rem; }
    .card-images { margin-bottom: 0.5rem; }
    .img-slot { aspect-ratio: 3/2; }
    .fixture-id-input { margin-bottom: 0.5rem; font-size: 8px; }
    .spec-table td { padding: 3px 0; }
    .spec-label { font-size: 7px; }
    .spec-input { font-size: 10px; border-bottom: none !important; }
    .contact-input, .fixture-id-input { border-bottom: none !important; }
    .img-slot i, .img-slot span { display: none; }
    .img-slot img { display: block; }
    .guide-footer { padding: 1rem 2rem; }
    .contact-label { font-size: 7px; }
    .contact-input { font-size: 10px; }
    .footer-brand { font-size: 12px; }
    .guide-header { break-after: avoid; page-break-after: avoid; }
    .guide-footer { break-before: avoid; page-break-before: avoid; }
  }
</style>
</head>
<body>
<div class="guide">
  <div class="guide-header">
    <div class="header-project">
      <h1 contenteditable="true" spellcheck="false">Client Project Name</h1>
      <p class="subtitle" contenteditable="true" spellcheck="false" style="outline:none;">Decorative Lamping Guide</p>
    </div>
    <div class="header-meta">
      <p class="date" id="guide-date"></p>
      <p class="brand">Lumber &amp; Light</p>
    </div>
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" onclick="addFixture()"><i class="ti ti-plus"></i> Add Fixture</button>
    <button class="toolbar-btn" onclick="newGuide()"><i class="ti ti-file-plus"></i> New</button>
    <a id="save-link" class="toolbar-btn" style="text-decoration:none;" href="#" download="guide.lg"><i class="ti ti-device-floppy"></i> Save</a>
    <label class="toolbar-btn" for="load-input"><i class="ti ti-folder-open"></i> Load</label>
    <input id="load-input" type="file" accept=".lg" style="display:none" onchange="loadGuide(this)">
    <span class="toolbar-spacer"></span>
    <span class="toolbar-hint">Click any field to edit</span>
  </div>

  <div class="fixture-grid" id="fixture-grid"></div>

  <div class="add-row">
    <button class="add-btn" onclick="addFixture()"><i class="ti ti-plus"></i> Add fixture</button>
  </div>

  <div class="guide-footer">
    <div class="contact-grid">
      <div class="contact-field">
        <span class="contact-label">Point of contact</span>
        <input class="contact-input" id="contact-name" type="text" value="Leah Frankl" placeholder="Name">
      </div>
      <div class="contact-field">
        <span class="contact-label">Email</span>
        <input class="contact-input" id="contact-email" type="text" value="leah@lumberandlight.com" placeholder="email@example.com">
      </div>
      <div class="contact-field">
        <span class="contact-label">Telephone</span>
        <input class="contact-input" id="contact-phone" type="text" value="(301) 938-4294" placeholder="(000) 000-0000">
      </div>
    </div>
    <p class="footer-brand">Lumber &amp; Light</p>
  </div>
</div>

<script>
  document.getElementById('guide-date').textContent = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });

  const defaultFixtures = [
    { id:'FF-12A/B', manufacturer:'SATCO', product:'S12430', sku:'S12430', kelvin:'3000K', lumens:'1,500 Lumens', base:'E26 / A19', qty:'1' },
    { id:'FF-14.1 — Small', manufacturer:'Sylvania', product:'57022', sku:'40T4/G9/CL 120V', kelvin:'2900K', lumens:'510 Lumens', base:'G9', qty:'1' },
    { id:'FF-14.2 — Medium', manufacturer:'EmeryAllen', product:'A19 7.0W DTW', sku:'EA-A19-7.0W-E26-DTW-2718W', kelvin:'1800–2700K', lumens:'520 Lumens', base:'E26 / A19', qty:'1' },
    { id:'FF-14.3 — Large', manufacturer:'EmeryAllen', product:'A19 7.0W DTW', sku:'EA-A19-7.0W-E26-DTW-2718W', kelvin:'1800–2700K', lumens:'520 Lumens', base:'E26 / A19', qty:'1' },
    { id:'FF-18', manufacturer:'Tala', product:'Candle E12 LED Bulb', sku:'CAND-4W-2200K-E12-NT-120V', kelvin:'2200K', lumens:'300 Lumens', base:'E12 / C11', qty:'1' },
    { id:'FF-37', manufacturer:'Philips', product:'52551', sku:'8A19/PER/927-922/CL/G/E26/WGX 1FB T20', kelvin:'2200–2700K', lumens:'800 Lumens', base:'E26 / A19', qty:'1' },
  ];

  const imgStore = {};
  let fixtures = JSON.parse(JSON.stringify(defaultFixtures));

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function makeCard(f, i) {
    const card = document.createElement('div');
    card.className = 'fixture-card';
    card.innerHTML = `
      <button class="card-delete" onclick="removeFixture(${i})">✕</button>
      <input class="fixture-id-input" type="text" value="${esc(f.id)}" placeholder="Fixture ID" onchange="fixtures[${i}].id=this.value">
      <div class="card-images">
        <div class="img-slot" id="fixture-img-${i}" onclick="uploadImg(${i},'fixture')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,${i},'fixture')">
          <i class="ti ti-lamp"></i><span>Fixture</span>
          <button class="img-delete" onclick="clearImg(event,${i},'fixture')">✕</button>
        </div>
        <div class="img-slot" id="bulb-img-${i}" onclick="uploadImg(${i},'bulb')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,${i},'bulb')">
          <i class="ti ti-bulb"></i><span>Bulb</span>
          <button class="img-delete" onclick="clearImg(event,${i},'bulb')">✕</button>
        </div>
      </div>
      <table class="spec-table">
        <tr><td class="spec-label">Manufacturer</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.manufacturer)}" placeholder="—" onchange="fixtures[${i}].manufacturer=this.value"></td></tr>
        <tr><td class="spec-label">Product Name</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.product)}" placeholder="—" onchange="fixtures[${i}].product=this.value"></td></tr>
        <tr><td class="spec-label">SKU</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.sku)}" placeholder="—" onchange="fixtures[${i}].sku=this.value"></td></tr>
        <tr><td class="spec-label">Kelvin</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.kelvin)}" placeholder="—" onchange="fixtures[${i}].kelvin=this.value"></td></tr>
        <tr><td class="spec-label">Lumens</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.lumens)}" placeholder="—" onchange="fixtures[${i}].lumens=this.value"></td></tr>
        <tr><td class="spec-label">Base / Shape</td><td class="spec-value"><input class="spec-input" type="text" value="${esc(f.base)}" placeholder="—" onchange="fixtures[${i}].base=this.value"></td></tr>
        <tr><td class="spec-label">Qty per fixture</td><td class="spec-value"><input class="spec-input qty" type="number" value="${esc(f.qty)}" min="1" placeholder="1" onchange="fixtures[${i}].qty=this.value"></td></tr>
      </table>`;
    return card;
  }

  function renderGrid() {
    const grid = document.getElementById('fixture-grid');
    grid.innerHTML = '';
    fixtures.forEach((f, i) => {
      const card = makeCard(f, i);
      grid.appendChild(card);
      ['fixture','bulb'].forEach(type => {
        const key = `${i}-${type}`;
        if (imgStore[key]) {
          const slot = document.getElementById(`${type}-img-${i}`);
          if (slot) slot.innerHTML = `<img src="${imgStore[key]}" alt="${type}"><button class="img-delete" onclick="clearImg(event,${i},'${type}')">✕</button>`;
        }
      });
    });
  }

  function addFixture() {
    fixtures.push({ id:'New Fixture', manufacturer:'', product:'', sku:'', kelvin:'', lumens:'', base:'', qty:'1' });
    renderGrid();
    const cards = document.querySelectorAll('.fixture-card');
    const last = cards[cards.length-1];
    if (last) { last.scrollIntoView({ behavior:'smooth', block:'center' }); last.querySelector('.fixture-id-input')?.focus(); }
  }

  function removeFixture(i) {
    fixtures.splice(i, 1);
    const newStore = {};
    Object.entries(imgStore).forEach(([k,v]) => {
      const [idx,type] = k.split('-'); const n = parseInt(idx);
      if (n < i) newStore[k] = v;
      else if (n > i) newStore[`${n-1}-${type}`] = v;
    });
    Object.keys(imgStore).forEach(k => delete imgStore[k]);
    Object.assign(imgStore, newStore);
    renderGrid();
  }

  function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='copy'; e.currentTarget.classList.add('drag-over'); }
  function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

  function compressImage(dataUrl, maxW=800) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW/img.width);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function setImg(i, type, data) {
    imgStore[`${i}-${type}`] = data;
    const slot = document.getElementById(`${type}-img-${i}`);
    if (slot) slot.innerHTML = `<img src="${data}" alt="${type}"><button class="img-delete" onclick="clearImg(event,${i},'${type}')">✕</button>`;
  }

  function uploadImg(i, type) {
    const input = document.createElement('input');
    input.type='file'; input.accept='image/*';
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = async ev => setImg(i, type, await compressImage(ev.target.result));
      r.readAsDataURL(file);
    };
    input.click();
  }

  async function handleDrop(e, i, type) {
    e.preventDefault(); e.stopPropagation();
    e.currentTarget.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = async ev => setImg(i, type, await compressImage(ev.target.result));
    r.readAsDataURL(file);
  }

  function clearImg(e, i, type) {
    e.stopPropagation();
    delete imgStore[`${i}-${type}`];
    const slot = document.getElementById(`${type}-img-${i}`);
    const icon = type==='fixture' ? 'ti-lamp' : 'ti-bulb';
    if (slot) slot.innerHTML = `<i class="ti ${icon}"></i><span>${type}</span><button class="img-delete" onclick="clearImg(event,${i},'${type}')">✕</button>`;
  }

  // ── Save / Load ───────────────────────────────────────────────
  let currentBlobUrl = null;

  function updateSaveLink() {
    const state = getState();
    const json = JSON.stringify(state);
    const filename = (state.projectName || 'Lamping_Guide').replace(/[^a-z0-9_\-\s]/gi,'').trim().replace(/\s+/g,'_') + '.lg';
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = URL.createObjectURL(new Blob([json], { type: 'application/octet-stream' }));
    const link = document.getElementById('save-link');
    link.href = currentBlobUrl;
    link.download = filename;
  }

  // Keep save link fresh on every edit
  document.addEventListener('input', updateSaveLink);
  document.addEventListener('change', updateSaveLink);
  function getState() {
    return {
      projectName:  document.querySelector('h1').textContent.trim(),
      contactName:  document.getElementById('contact-name').value,
      contactEmail: document.getElementById('contact-email').value,
      contactPhone: document.getElementById('contact-phone').value,
      fixtures, imgStore
    };
  }

  function applyState(s) {
    if (s.projectName) document.querySelector('h1').textContent = s.projectName;
    if (s.contactName)  document.getElementById('contact-name').value  = s.contactName;
    if (s.contactEmail) document.getElementById('contact-email').value = s.contactEmail;
    if (s.contactPhone) document.getElementById('contact-phone').value = s.contactPhone;
    if (s.fixtures) fixtures = s.fixtures;
    if (s.imgStore) { Object.keys(imgStore).forEach(k => delete imgStore[k]); Object.assign(imgStore, s.imgStore); }
    renderGrid();
  }

  function saveGuide() {
    const state = getState();
    const json = JSON.stringify(state);
    const filename = (state.projectName || 'Lamping_Guide').replace(/[^a-z0-9_\-\s]/gi,'').trim().replace(/\s+/g,'_') + '.lg';
    // Use showSaveFilePicker if available (Chrome, Edge, Brave with shields down)
    if (window.showSaveFilePicker) {
      window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'Lamping Guide', accept: { 'application/octet-stream': ['.lg'] } }]
      }).then(fh => fh.createWritable()).then(w => w.write(json).then(() => w.close())).catch(() => fallbackSave(json, filename));
    } else {
      fallbackSave(json, filename);
    }
  }

  function fallbackSave(json, filename) {
    // Last resort — copy to clipboard and alert
    if (navigator.clipboard) {
      navigator.clipboard.writeText(json).then(() => {
        alert('Your browser blocked the file download.\n\nYour guide data has been copied to clipboard.\nPaste it into a text file and save it as "' + filename + '".');
      });
    } else {
      alert('Your browser blocked the file download. Please use Chrome or Edge for file saving.');
    }
  }

  function loadGuide(input) {
    const file = input.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { applyState(JSON.parse(ev.target.result)); input.value = ''; }
      catch(err) { alert('Could not load file: ' + err.message); }
    };
    r.readAsText(file);
  }

  function newGuide() {
    if (!confirm('Start a new guide? Save first if you have unsaved changes.')) return;
    Object.keys(imgStore).forEach(k => delete imgStore[k]);
    fixtures = JSON.parse(JSON.stringify(defaultFixtures));
    document.querySelector('h1').textContent = 'Client Project Name';
    document.getElementById('contact-name').value  = 'Leah Frankl';
    document.getElementById('contact-email').value = 'leah@lumberandlight.com';
    document.getElementById('contact-phone').value = '(301) 938-4294';
    renderGrid();
  }

  // ── Print handling ────────────────────────────────────────────
  window.addEventListener('beforeprint', () => {
    const grid = document.getElementById('fixture-grid');
    const cards = Array.from(grid.querySelectorAll('.fixture-card'));
    grid.innerHTML = '';
    // Group into pages of 4 (2 rows × 2 cols)
    for (let i = 0; i < cards.length; i += 4) {
      const page = document.createElement('div');
      page.className = 'print-page';
      cards.slice(i, i + 4).forEach(c => page.appendChild(c));
      grid.appendChild(page);
    }
  });

  window.addEventListener('afterprint', () => {
    renderGrid();
  });

  // ── Init ─────────────────────────────────────────────────────
  fixtures = JSON.parse(JSON.stringify(defaultFixtures));
  renderGrid();
  updateSaveLink();
</script>
</body>
</html>
